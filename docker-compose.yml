version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      POSTGRES_DB: 
    volumes:
      - 
      - 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinks -d drinks"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Nadpisujemy rzeczy ktore w kontenerze MUSZA byc inne niz lokalnie:
      DATABASE_URL: 
      CORS_ORIGINS: 
    ports:
      - "4000:4000"
    volumes:
      - 
      - 

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Puste = frontend auto-wykryje host (localhost na kompie, 192.168.x.x z telefonu).
      # Ustaw np. http://192.168.8.100:4000 tylko jesli API chodzi na innej maszynie niz frontend.
      VITE_API_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
